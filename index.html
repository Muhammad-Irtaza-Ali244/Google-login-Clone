<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">    
</head>
<body>
    <div class="main">
        <div class="google-box">
            <div class="left-box">
                <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="Google Logo">
                <h1>Sign in to Chrome</h1>
                <h3>Use your Google Account</h3>
            </div>
            <div class="right-box">
                <div class="input-div">
                    <input type="email number" placeholder="Email or phone">
                    <a href="">Forgot email?</a>

                </div>
                <div class="link-box">
                    <span>Not your computer? Use Guest mode to sign in privately.</span>
                    <a href="">Learn more about using Guest mode</a>
                </div>
                <div class="btn-box">
                    <a href="">Create account</a>
                    <a href="">Next</a>
                </div>
            </div>
        </div>
        <div class="span-box">
            <span>English (United States)</span>
            <div class="last-btn">
                <span>Help</span>
                <span>Privacy</span>
                <span>Terms</span>
            </div>
        </div>
    </div>
</body>
</html>!
